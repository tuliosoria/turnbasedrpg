AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Ravenloft O Inverno dos Mortos - backend

Parameters:
  AdminCodeHash:
    Type: String
    NoEcho: true
  TokenSigningSecret:
    Type: String
    NoEcho: true
  AllowedOrigin:
    Type: String
    Default: "http://localhost:5173"
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Default: ""
  OpenAiModel:
    Type: String
    Default: "gpt-4o-mini"

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs22.x

Resources:
  GameTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ravenloft-game
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  ImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ravenloft-images-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  ImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImagesBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadForImages
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${ImagesBucket.Arn}/*"

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: dist/
      Environment:
        Variables:
          TABLE_NAME: !Ref GameTable
          CAMPAIGN_ID: winter-dead
          ADMIN_CODE_HASH: !Ref AdminCodeHash
          TOKEN_SIGNING_SECRET: !Ref TokenSigningSecret
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          OPENAI_API_KEY: !Ref OpenAiApiKey
          OPENAI_MODEL: !Ref OpenAiModel
          IMAGES_BUCKET: !Ref ImagesBucket
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:ConditionCheckItem
                - dynamodb:TransactWriteItems
              Resource:
                - !GetAtt GameTable.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - !Sub "${ImagesBucket.Arn}/*"
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

Outputs:
  ApiBaseUrl:
    Description: Base URL of the HTTP API
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TableName:
    Value: !Ref GameTable
